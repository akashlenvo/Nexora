name: Create release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write

jobs:
  android:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "17"
      - uses: gradle/actions/setup-gradle@v4
      - name: Build APK
        working-directory: android
        run: ./gradlew --no-daemon assembleRelease
      - uses: actions/upload-artifact@v4
        with:
          name: release-android
          path: android/app/build/outputs/apk/release/app-release.apk

  windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v5
        with:
          submodules: recursive
      - name: Set up MSBuild
        uses: microsoft/setup-msbuild@v2
      - name: Restore vcpkg packages
        id: vcpkg-cache
        uses: actions/cache/restore@v4
        with:
          path: |
            vcpkg_installed
            C:\Users\runneradmin\AppData\Local\vcpkg\archives
          key: vcpkg-windows-${{ hashFiles('vcpkg.json') }}
      - name: Install C++ dependencies
        shell: pwsh
        run: |
          & "$env:VCPKG_INSTALLATION_ROOT\vcpkg.exe" install --triplet x64-windows
          & "$env:VCPKG_INSTALLATION_ROOT\vcpkg.exe" integrate install
      - name: Build virtual camera
        shell: cmd
        run: |
          msbuild windows\3rdparty\softcam\softcam.sln /m /t:softcam /p:Configuration=Release /p:Platform=x64
          msbuild windows\3rdparty\softcam\examples\softcam_installer\softcam_installer.sln /m /p:Configuration=Release /p:Platform=x64
      - name: Build Nexora Studio
        shell: cmd
        run: msbuild windows\Nexora.sln /m /p:Configuration=Release /p:Platform=x64
      - name: Add package files
        shell: pwsh
        run: |
          Copy-Item install.bat, install_apk.bat, uninstall.bat dist\
          Copy-Item LICENSE, ATTRIBUTION.md, README.md dist\
      - uses: actions/upload-artifact@v4
        with:
          name: release-windows
          path: dist/**
      - name: Save vcpkg packages
        if: always() && steps.vcpkg-cache.outputs.cache-hit != 'true'
        uses: actions/cache/save@v4
        with:
          path: |
            vcpkg_installed
            C:\Users\runneradmin\AppData\Local\vcpkg\archives
          key: vcpkg-windows-${{ hashFiles('vcpkg.json') }}

  linux:
    needs: android
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v5
      - uses: actions/download-artifact@v4
        with:
          name: release-android
          path: artifacts/android
      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential cmake ninja-build pkg-config libasio-dev \
            libwxgtk3.2-dev libavformat-dev libavcodec-dev libavutil-dev \
            libswscale-dev libswresample-dev
      - name: Build Linux client
        run: |
          cmake -S windows -B build/linux -G Ninja -DCMAKE_BUILD_TYPE=Release
          cmake --build build/linux --parallel
      - name: Create Linux Mint package
        shell: bash
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          PACKAGE="$GITHUB_WORKSPACE/dist/Nexora-Linux-Mint-x86_64"
          cmake --install build/linux --prefix "$PACKAGE"
          cp linux/install.sh linux/install_apk.sh linux/uninstall.sh linux/nexora linux/nexora.desktop linux/README.md "$PACKAGE/"
          cp assets/brand/nexora-mark.svg "$PACKAGE/"
          cp LICENSE ATTRIBUTION.md "$PACKAGE/"
          mkdir -p "$PACKAGE/apk"
          cp artifacts/android/app-release.apk "$PACKAGE/apk/Nexora-Android-v${VERSION}.apk"
          chmod +x "$PACKAGE/install.sh" "$PACKAGE/install_apk.sh" "$PACKAGE/uninstall.sh" "$PACKAGE/nexora" "$PACKAGE/Nexora"
          (cd "$PACKAGE" && find . -type f ! -name 'SHA256SUMS.txt' -print0 | sort -z | xargs -0 sha256sum) > "$PACKAGE/SHA256SUMS.txt"
          tar -C dist -czf "dist/Nexora-Linux-Mint-x86_64-v${VERSION}.tar.gz" Nexora-Linux-Mint-x86_64
      - uses: actions/upload-artifact@v4
        with:
          name: release-linux
          path: dist/Nexora-Linux-Mint-x86_64-v*.tar.gz

  publish:
    needs: [android, windows, linux]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          submodules: recursive
      - uses: actions/download-artifact@v4
        with:
          name: release-android
          path: artifacts/android
      - uses: actions/download-artifact@v4
        with:
          name: release-windows
          path: artifacts/windows
      - uses: actions/download-artifact@v4
        with:
          name: release-linux
          path: artifacts/linux
      - name: Package release
        shell: bash
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          mkdir -p artifacts/windows/apk
          mv artifacts/android/app-release.apk "artifacts/windows/apk/Nexora-Android-v${VERSION}.apk"
          (cd artifacts/windows && find . -type f ! -name 'SHA256SUMS.txt' -print0 | sort -z | xargs -0 sha256sum) > artifacts/windows/SHA256SUMS.txt
          (cd artifacts/windows && zip -r "../../Nexora-v${VERSION}.zip" .)
          mv artifacts/linux/Nexora-Linux-Mint-x86_64-v*.tar.gz .
      - name: Publish GitHub release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          prerelease: ${{ contains(github.ref_name, '-beta') }}
          files: |
            Nexora-v*.zip
            Nexora-Linux-Mint-x86_64-v*.tar.gz
