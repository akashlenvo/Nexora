name: Create release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write

jobs:
  android:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "17"
      - uses: gradle/actions/setup-gradle@v4
      - name: Build APK
        working-directory: android
        run: ./gradlew --no-daemon assembleRelease
      - uses: actions/upload-artifact@v4
        with:
          name: release-android
          path: android/app/build/outputs/apk/release/app-release.apk

  windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v5
        with:
          submodules: recursive
      - name: Set up MSBuild
        uses: microsoft/setup-msbuild@v2
      - name: Restore vcpkg packages
        id: vcpkg-cache
        uses: actions/cache/restore@v4
        with:
          path: |
            vcpkg_installed
            C:\Users\runneradmin\AppData\Local\vcpkg\archives
          key: vcpkg-windows-${{ hashFiles('vcpkg.json') }}
      - name: Install C++ dependencies
        shell: pwsh
        run: |
          & "$env:VCPKG_INSTALLATION_ROOT\vcpkg.exe" install --triplet x64-windows
          & "$env:VCPKG_INSTALLATION_ROOT\vcpkg.exe" integrate install
      - name: Build virtual camera
        shell: cmd
        run: |
          msbuild windows\3rdparty\softcam\softcam.sln /m /t:softcam /p:Configuration=Release /p:Platform=x64
          msbuild windows\3rdparty\softcam\examples\softcam_installer\softcam_installer.sln /m /p:Configuration=Release /p:Platform=x64
      - name: Build Nexora Studio
        shell: cmd
        run: msbuild windows\Nexora.sln /m /p:Configuration=Release /p:Platform=x64
      - name: Add package files
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force dist\scripts | Out-Null
          Copy-Item install.bat, install_apk.bat, uninstall.bat dist\scripts\
          Copy-Item LICENSE, ATTRIBUTION.md, README.md dist\
      - uses: actions/upload-artifact@v4
        with:
          name: release-windows
          path: dist/**
      - name: Save vcpkg packages
        if: always() && steps.vcpkg-cache.outputs.cache-hit != 'true'
        uses: actions/cache/save@v4
        with:
          path: |
            vcpkg_installed
            C:\Users\runneradmin\AppData\Local\vcpkg\archives
          key: vcpkg-windows-${{ hashFiles('vcpkg.json') }}

  publish:
    needs: [android, windows]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          submodules: recursive
      - uses: actions/download-artifact@v4
        with:
          name: release-android
          path: artifacts/android
      - uses: actions/download-artifact@v4
        with:
          name: release-windows
          path: artifacts/windows
      - name: Package release
        shell: bash
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          mv artifacts/android/app-release.apk "Nexora-Android-v${VERSION}.apk"
          mkdir -p artifacts/windows/apk
          cp "Nexora-Android-v${VERSION}.apk" "artifacts/windows/apk/"
          (cd artifacts/windows && zip -r "../../Nexora-Windows-x64.zip" .)
          zip -r "Nexora-v${VERSION}-source.zip" . \
            -x '.git/*' 'artifacts/*' 'android/*/build/*' 'android/.gradle/*' 'dist/*' '*.zip'
          sha256sum Nexora-Android-*.apk Nexora-Windows-x64.zip Nexora-*-source.zip > SHA256SUMS.txt
      - name: Publish GitHub release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            Nexora-Android-*.apk
            Nexora-Windows-x64.zip
            Nexora-*-source.zip
            SHA256SUMS.txt
